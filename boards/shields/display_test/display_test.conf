# Display Hardware Test - Shield Configuration

# USB serial console
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=y

# Boot delay for USB enumeration
CONFIG_BOOT_DELAY=3000

# GPIO access
CONFIG_GPIO=y

# Our test code
CONFIG_DISPLAY_HW_TEST=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y
