# Overrides loaded after shield conf to fix compatibility
# ZMK Studio requires UART chosen node that scanner doesn't have
CONFIG_ZMK_STUDIO=n

# Enable USB serial console for debug logging
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=y
